<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Ferreagro Emmanuel</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #f5f5f5; /* NUEVO: Fondo de color claro (gris muy suave) */
            overflow: hidden; /* Evita el scroll innecesario */
            font-family: 'Arial Black', sans-serif;
        }

        .slider {
            width: 100%;
            height: 100vh;
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
        }

        .producto {
            min-width: 100%;
            height: 100vh;
            scroll-snap-align: start;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        img {
            /* AJUSTE: Ahora la imagen usa el 100% del alto y ancho disponible... */
            width: 100%;
            height: 100%;
            /* ...PERO: 'contain' asegura que se muestre el producto COMPLETO.
               No se cortará nada. Se adaptará a la tablet sin deformarse. */
            object-fit: contain; 
            /* Para que se vea más limpio con el fondo claro */
            background-color: transparent; 
        }

        .nombre-barra {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: #001f3f; /* NUEVO: Azul oscuro sólido Ferreagro */
            color: #ffdb58; /* NUEVO: Letras amarillo mostaza para contraste */
            text-align: center;
            padding: 30px 0; /* Un poco más de espacio */
            font-size: 3rem; /* Letras un poco más grandes */
            text-transform: uppercase;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.3); /* Sombra elegante */

            .boton-pdf {
            position: fixed;
            top: 20px;
            right: 20px;
            background-color: #001f3f; /* Tu azul oscuro */
            color: #ffdb58; /* Tu amarillo */
            padding: 15px 25px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            z-index: 1000; /* Para que siempre esté encima de la foto */
            border: 2px solid #ffdb58;
        }

        .boton-pdf:hover {
            background-color: #ffdb58;
            color: #001f3f;
        }
        }
    </style>
</head>
<body>
    <a href="{{ url_for('descargar_pdf') }}" class="boton-pdf">📥 DESCARGAR PDF</a>

    <div class="slider">
        {% for foto in fotos %}
        <div class="producto">
            <img src="{{ url_for('static', filename='productos/' + foto) }}">
            <div class="nombre-barra">
                {{ foto.split('.')[0].replace('_', ' ') }}
            </div>
        </div>
        {% endfor %}
    </div>

</body>
</html>
